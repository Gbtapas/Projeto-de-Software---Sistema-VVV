# ============================================================
#  Sistema Vai&Volta Viagens (VVV) — configuração da aplicação
# ============================================================

spring.application.name=reservas

# ---- Banco de dados (MySQL já existente) -------------------
spring.datasource.url=jdbc:mysql://localhost:3306/vvv?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

# ---- JPA / Hibernate ---------------------------------------
# IMPORTANTE: o banco JÁ existe (scripts 01-05 + triggers). O app NUNCA recria
# nem altera a estrutura. Toda regra de negócio vive no banco (triggers/constraints).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Codificação HTTP --------------------------------------
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ---- Thymeleaf ---------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ---- Servidor ----------------------------------------------
server.port=8080
