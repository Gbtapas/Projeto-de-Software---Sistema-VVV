<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viagens disponíveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container my-4">
    <h1 class="h4 mb-3">Viagens disponíveis</h1>

    <div th:if="${msgSucesso}" class="alert alert-success" role="alert" th:text="${msgSucesso}"></div>
    <div th:if="${msgErro}" class="alert alert-danger" role="alert" th:text="${msgErro}"></div>

    <!-- Filtro rápido -->
    <form th:action="@{/viagens}" th:object="${busca}" method="get" class="row g-2 align-items-end mb-4">
        <div class="col-md-4">
            <label for="origem" class="form-label">Origem</label>
            <select th:field="*{origem}" class="form-select form-select-sm">
                <option value="">Qualquer</option>
                <option th:each="c : ${cidades}" th:value="${c.identificador}"
                        th:text="${c.nome + ' (' + c.identificador + ')'}"></option>
            </select>
        </div>
        <div class="col-md-4">
            <label for="destino" class="form-label">Destino</label>
            <select th:field="*{destino}" class="form-select form-select-sm">
                <option value="">Qualquer</option>
                <option th:each="c : ${cidades}" th:value="${c.identificador}"
                        th:text="${c.nome + ' (' + c.identificador + ')'}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <label for="data" class="form-label">Data</label>
            <input type="date" th:field="*{data}" class="form-control form-control-sm">
        </div>
        <div class="col-md-1 d-grid">
            <button class="btn btn-sm btn-primary">Filtrar</button>
        </div>
    </form>

    <div th:if="${passageiros.isEmpty()}" class="alert alert-warning">
        Nenhum passageiro cadastrado. <a th:href="@{/passageiro/novo}">Cadastre um passageiro</a> para poder reservar.
    </div>

    <div th:if="${viagens.isEmpty()}" class="alert alert-info">
        Nenhuma viagem disponível para os critérios informados.
    </div>

    <div class="table-responsive" th:unless="${viagens.isEmpty()}">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th scope="col">Rota</th>
                <th scope="col">Trecho</th>
                <th scope="col">Data</th>
                <th scope="col">Modal</th>
                <th scope="col">Vagas</th>
                <th scope="col" class="text-end">Valor</th>
                <th scope="col" colspan="2">Reservar para</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${viagens}">
                <td>
                    <span class="fw-semibold" th:text="${v.descricaoRota}"></span><br>
                    <small class="text-muted" th:text="${v.transportadora}"></small>
                </td>
                <td>
                    <span th:text="${v.codOrigem}"></span> →
                    <span th:text="${v.codDestino}"></span>
                </td>
                <td th:text="${#temporals.format(v.dataViagem, 'dd/MM/yyyy')}"></td>
                <td>
                    <span th:text="${v.tipoModal}"></span><br>
                    <small class="text-muted" th:text="${v.modeloModal}"></small>
                </td>
                <td><span class="badge text-bg-success" th:text="${v.vagasDisponiveis}"></span></td>
                <td class="text-end fw-semibold"
                    th:text="${'R$ ' + #numbers.formatDecimal(v.valorBase, 1, 'POINT', 2, 'COMMA')}"></td>
                <td colspan="2">
                    <form th:action="@{/reserva/nova}" method="post" class="d-flex gap-2">
                        <input type="hidden" name="idProgramacao" th:value="${v.idProgramacao}">
                        <select name="idPassageiro" class="form-select form-select-sm" required
                                aria-label="Selecionar passageiro para reservar"
                                th:disabled="${passageiros.isEmpty()}">
                            <option value="">Selecione...</option>
                            <option th:each="p : ${passageiros}" th:value="${p.id}"
                                    th:text="${p.nome + ' — ' + p.idade + ' anos'}"></option>
                        </select>
                        <button class="btn btn-sm btn-primary text-nowrap"
                                th:disabled="${passageiros.isEmpty()}">Reservar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
