<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viagens disponíveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container my-4">
    <h1 class="h4 mb-3">Viagens disponíveis</h1>

    <div th:if="${msgSucesso}" class="alert alert-success" role="alert" th:text="${msgSucesso}"></div>
    <div th:if="${msgErro}" class="alert alert-danger" role="alert" th:text="${msgErro}"></div>

    <!-- Filtro rápido -->
    <form th:action="@{/viagens}" th:object="${busca}" method="get" class="row g-2 align-items-end mb-4">
        <div class="col-md-4">
            <label for="origem" class="form-label">Origem</label>
            <select th:field="*{origem}" class="form-select form-select-sm">
                <option value="">Qualquer</option>
                <option th:each="c : ${cidades}" th:value="${c.identificador}"
                        th:text="${c.nome + ' (' + c.identificador + ')'}"></option>
            </select>
        </div>
        <div class="col-md-4">
            <label for="destino" class="form-label">Destino</label>
            <select th:field="*{destino}" class="form-select form-select-sm">
                <option value="">Qualquer</option>
                <option th:each="c : ${cidades}" th:value="${c.identificador}"
                        th:text="${c.nome + ' (' + c.identificador + ')'}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <label for="data" class="form-label">Data</label>
            <input type="date" th:field="*{data}" class="form-control form-control-sm">
        </div>
        <div class="col-md-1 d-grid">
            <button class="btn btn-sm btn-primary">Filtrar</button>
        </div>
    </form>

    <div th:if="${passageiros.isEmpty()}" class="alert alert-warning">
        Nenhum passageiro cadastrado. <a th:href="@{/passageiro/novo}">Cadastre um passageiro</a> para poder reservar.
    </div>

    <div th:if="${viagens.isEmpty()}" class="alert alert-info">
        Nenhuma viagem disponível para os critérios informados.
    </div>

    <div class="table-responsive" th:unless="${viagens.isEmpty()}">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th scope="col">Rota</th>
                <th scope="col">Trecho</th>
                <th scope="col">Data</th>
                <th scope="col">Modal</th>
                <th scope="col">Vagas</th>
                <th scope="col" class="text-end">Valor</th>
                <th scope="col" colspan="2">Reservar para</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${viagens}">
                <td>
                    <span class="fw-semibold" th:text="${v.descricaoRota}"></span><br>
                    <small class="text-muted" th:text="${v.transportadora}"></small>
                </td>
                <td>
                    <span th:text="${v.codOrigem}"></span> →
                    <span th:text="${v.codDestino}"></span>
                </td>
                <td th:text="${#temporals.format(v.dataViagem, 'dd/MM/yyyy')}"></td>
                <td>
                    <span th:text="${v.tipoModal}"></span><br>
                    <small class="text-muted" th:text="${v.modeloModal}"></small>
                </td>
                <td><span class="badge text-bg-success" th:text="${v.vagasDisponiveis}"></span></td>
                <td class="text-end fw-semibold"
                    th:text="${'R$ ' + #numbers.formatDecimal(v.valorBase, 1, 'POINT', 2, 'COMMA')}"></td>
                <td colspan="2">
                    <form th:action="@{/reserva/nova}" method="post" class="d-flex flex-column gap-2" onsubmit="return validarAcompanhante(this)">
                        <input type="hidden" name="idProgramacao" th:value="${v.idProgramacao}">
                        <div class="d-flex gap-2">
                            <select name="idPassageiro" class="form-select form-select-sm passageiro-sel" required
                                    aria-label="Selecionar passageiro para reservar"
                                    th:disabled="${passageiros.isEmpty()}"
                                    onchange="toggleAcompanhante(this)">
                                <option value="" data-idade="-1">Selecione...</option>
                                <option th:each="p : ${passageiros}"
                                        th:value="${p.id}"
                                        th:attr="data-idade=${p.idade}"
                                        th:text="${p.nome + ' — ' + p.idade + ' anos'}"></option>
                            </select>
                            <button class="btn btn-sm btn-primary text-nowrap"
                                    th:disabled="${passageiros.isEmpty()}">Reservar</button>
                        </div>
                        <!-- Acompanhante: visível apenas quando passageiro tem entre 2 e 10 anos (RN04) -->
                        <div class="acomp-row d-none">
                            <label class="form-label mb-1 small text-warning fw-semibold">
                                ⚠ Criança (2–10 anos) — selecione um acompanhante adulto (+21 anos):
                            </label>
                            <select name="idAcompanhante" class="form-select form-select-sm acomp-sel">
                                <option value="">Selecione o acompanhante...</option>
                                <option th:each="p : ${passageiros}"
                                        th:value="${p.id}"
                                        th:attr="data-idade=${p.idade}"
                                        th:text="${p.nome + ' — ' + p.idade + ' anos'}"></option>
                            </select>
                        </div>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/**
 * Exibe/oculta o select de acompanhante conforme a idade do passageiro escolhido.
 * RN04: passageiro entre 2 e 10 anos precisa de acompanhante com mais de 21 anos.
 */
function toggleAcompanhante(sel) {
    const form      = sel.closest('form');
    const acompRow  = form.querySelector('.acomp-row');
    const acompSel  = form.querySelector('.acomp-sel');
    const idade     = parseInt(sel.selectedOptions[0]?.dataset.idade ?? '-1', 10);
    const ehCrianca = idade >= 2 && idade <= 10;
    const passId    = sel.value;

    if (ehCrianca) {
        // Mostra o painel e filtra para mostrar apenas adultos (>21) que não sejam o próprio passageiro
        acompRow.classList.remove('d-none');
        acompSel.required = true;
        Array.from(acompSel.options).forEach(opt => {
            if (opt.value === '') return; // mantém o placeholder
            const idadeOpt = parseInt(opt.dataset.idade ?? '0', 10);
            opt.hidden = (opt.value === passId) || (idadeOpt <= 21);
        });
    } else {
        acompRow.classList.add('d-none');
        acompSel.required = false;
        acompSel.value    = '';
        Array.from(acompSel.options).forEach(opt => opt.hidden = false);
    }
}

/** Validação antes do submit: garante que acompanhante foi selecionado quando obrigatório. */
function validarAcompanhante(form) {
    const acompRow = form.querySelector('.acomp-row');
    const acompSel = form.querySelector('.acomp-sel');
    if (!acompRow.classList.contains('d-none') && !acompSel.value) {
        alert('Selecione um acompanhante adulto (mais de 21 anos) para o passageiro menor de idade.');
        return false;
    }
    return true;
}
</script>
</body>
</html>
