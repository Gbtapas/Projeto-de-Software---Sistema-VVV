<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Cidades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-3">Cidades <small class="text-muted">(RF05)</small></h1>
    <div th:if="${msgSucesso}" class="alert alert-success" th:text="${msgSucesso}"></div>

    <form th:action="@{/admin/cidades}" method="post" class="row g-2 align-items-end mb-4">
        <div class="col-md-4"><label class="form-label">Nome</label>
            <input name="nome" class="form-control" required></div>
        <div class="col-md-3"><label class="form-label">Estado</label>
            <input name="estado" class="form-control" required></div>
        <div class="col-md-2"><label class="form-label">País</label>
            <input name="pais" class="form-control" value="Brasil"></div>
        <div class="col-md-2"><label class="form-label">Identificador (3 letras)</label>
            <input name="identificador" class="form-control text-uppercase" maxlength="3" required></div>
        <div class="col-md-1 d-grid"><button class="btn btn-primary">Salvar</button></div>
    </form>

    <table class="table table-sm table-hover">
        <thead class="table-light"><tr><th>ID</th><th>Cód.</th><th>Nome</th><th>Estado</th><th>País</th><th></th></tr></thead>
        <tbody>
        <tr th:each="c : ${cidades}">
            <td th:text="${c.id}"></td>
            <td><span class="badge text-bg-secondary" th:text="${c.identificador}"></span></td>
            <td th:text="${c.nome}"></td><td th:text="${c.estado}"></td><td th:text="${c.pais}"></td>
            <td><form th:action="@{'/admin/cidades/' + ${c.id} + '/excluir'}" method="post"
                      onsubmit="return confirm('Excluir cidade?');">
                <button class="btn btn-sm btn-outline-danger">Excluir</button></form></td>
        </tr>
        </tbody>
    </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
