<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Pontos de Venda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-3">Pontos de Venda e Vínculos <small class="text-muted">(RF17 / RF18)</small></h1>
    <div th:if="${msgSucesso}" class="alert alert-success" th:text="${msgSucesso}"></div>

    <!-- Cadastro de PDV -->
    <div class="card mb-4">
        <div class="card-header fw-bold">Novo Ponto de Venda <small class="text-muted fw-normal">(RF17)</small></div>
        <div class="card-body">
            <form th:action="@{/admin/pontos}" method="post" class="row g-2 align-items-end">
                <div class="col-md-2">
                    <label class="form-label">CNPJ</label>
                    <input name="cnpj" class="form-control" maxlength="14" placeholder="Somente dígitos" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Nome</label>
                    <input name="nome" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Gerente responsável</label>
                    <select name="idGerente" class="form-select">
                        <option value="">Sem gerente</option>
                        <option th:each="f : ${funcionarios}"
                                th:if="${f.tipo.name() == 'GERENTE_PDV'}"
                                th:value="${f.id}" th:text="${f.nome}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Cidade</label>
                    <input name="cidadeEndereco" class="form-control">
                </div>
                <div class="col-md-1">
                    <label class="form-label">UF</label>
                    <input name="estadoEndereco" class="form-control" maxlength="2">
                </div>
                <div class="col-md-2 d-grid mt-4">
                    <button class="btn btn-primary">Cadastrar PDV</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Lista de PDVs -->
    <h2 class="h6 mb-2">Pontos de venda ativos</h2>
    <table class="table table-sm table-hover align-middle mb-4">
        <thead class="table-light">
            <tr><th>Código</th><th>Nome</th><th>CNPJ</th><th>Cidade</th><th>Gerente</th></tr>
        </thead>
        <tbody>
        <tr th:each="p : ${pontos}">
            <td th:text="${p.codigo}"></td>
            <td th:text="${p.nome}"></td>
            <td th:text="${p.cnpj}"></td>
            <td th:text="${p.cidadeEndereco != null ? p.cidadeEndereco + '/' + p.estadoEndereco : '-'}"></td>
            <td th:text="${p.gerente != null ? p.gerente.nome : 'Não designado'}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(pontos)}">
            <td colspan="5" class="text-center text-muted">Nenhum ponto de venda cadastrado.</td>
        </tr>
        </tbody>
    </table>

    <!-- Vincular funcionário a PDV -->
    <div class="card mb-4">
        <div class="card-header fw-bold">Vincular Funcionário a PDV <small class="text-muted fw-normal">(RF18 — máx. 2 por funcionário)</small></div>
        <div class="card-body">
            <form th:action="@{/admin/pontos/vincular}" method="post" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Funcionário</label>
                    <select name="idFuncionario" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option th:each="f : ${funcionarios}" th:value="${f.id}"
                                th:text="${f.nome + ' (' + f.tipo + ')'}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Ponto de venda</label>
                    <select name="idPonto" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option th:each="p : ${pontos}" th:value="${p.id}" th:text="${p.nome}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Data início</label>
                    <input name="dataInicio" type="date" class="form-control">
                </div>
                <div class="col-md-2 d-grid mt-4">
                    <button class="btn btn-success">Vincular</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Lista de vínculos ativos -->
    <h2 class="h6 mb-2">Vínculos ativos</h2>
    <table class="table table-sm table-hover align-middle">
        <thead class="table-light">
            <tr><th>Funcionário</th><th>Tipo</th><th>PDV</th><th>Desde</th><th>Ações</th></tr>
        </thead>
        <tbody>
        <tr th:each="v : ${vinculos}">
            <td th:text="${v.funcionario.nome}"></td>
            <td><span class="badge text-bg-secondary" th:text="${v.funcionario.tipo}"></span></td>
            <td th:text="${v.ponto.nome}"></td>
            <td th:text="${#temporals.format(v.dataInicio, 'dd/MM/yyyy')}"></td>
            <td>
                <form th:action="@{'/admin/pontos/' + ${v.id} + '/desvincular'}" method="post"
                      onsubmit="return confirm('Encerrar este vínculo?')">
                    <button class="btn btn-sm btn-outline-danger">Desvincular</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(vinculos)}">
            <td colspan="5" class="text-center text-muted">Nenhum vínculo ativo.</td>
        </tr>
        </tbody>
    </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
