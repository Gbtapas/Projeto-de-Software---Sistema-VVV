<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Aeroportos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-3">Aeroportos <small class="text-muted">(RF06)</small></h1>
    <div th:if="${msgSucesso}" class="alert alert-success" th:text="${msgSucesso}"></div>

    <form th:action="@{/admin/aeroportos}" method="post" class="row g-2 align-items-end mb-4">
        <div class="col-md-2"><label class="form-label">IATA</label>
            <input name="iata" class="form-control text-uppercase" maxlength="3" required></div>
        <div class="col-md-5"><label class="form-label">Nome</label>
            <input name="nome" class="form-control" required></div>
        <div class="col-md-3"><label class="form-label">Cidade</label>
            <select name="idCidade" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="c : ${cidades}" th:value="${c.id}"
                        th:text="${c.nome + ' (' + c.identificador + ')'}"></option>
            </select></div>
        <div class="col-md-2 d-grid"><button class="btn btn-primary">Salvar</button></div>
    </form>

    <table class="table table-sm table-hover">
        <thead class="table-light"><tr><th>ID</th><th>IATA</th><th>Nome</th><th>Cidade</th><th></th></tr></thead>
        <tbody>
        <tr th:each="a : ${aeroportos}">
            <td th:text="${a.id}"></td>
            <td><span class="badge text-bg-secondary" th:text="${a.codigoIata}"></span></td>
            <td th:text="${a.nome}"></td><td th:text="${a.cidade.nome}"></td>
            <td><form th:action="@{'/admin/aeroportos/' + ${a.id} + '/excluir'}" method="post"
                      onsubmit="return confirm('Excluir?');">
                <button class="btn btn-sm btn-outline-danger">Excluir</button></form></td>
        </tr>
        </tbody>
    </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
