<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Transportadoras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-3">Transportadoras <small class="text-muted">(RF02)</small></h1>
    <div th:if="${msgSucesso}" class="alert alert-success" th:text="${msgSucesso}"></div>

    <form th:action="@{/admin/transportadoras}" method="post" class="row g-2 align-items-end mb-4">
        <div class="col-md-4"><label class="form-label">CNPJ (14 dígitos)</label>
            <input name="cnpj" class="form-control" maxlength="18" required></div>
        <div class="col-md-6"><label class="form-label">Nome</label>
            <input name="nome" class="form-control" required></div>
        <div class="col-md-2 d-grid"><button class="btn btn-primary">Salvar</button></div>
    </form>

    <table class="table table-sm table-hover">
        <thead class="table-light"><tr><th>ID</th><th>CNPJ</th><th>Nome</th><th></th></tr></thead>
        <tbody>
        <tr th:each="t : ${transportadoras}">
            <td th:text="${t.id}"></td><td th:text="${t.cnpj}"></td><td th:text="${t.nome}"></td>
            <td><form th:action="@{'/admin/transportadoras/' + ${t.id} + '/excluir'}" method="post"
                      onsubmit="return confirm('Excluir?');">
                <button class="btn btn-sm btn-outline-danger">Excluir</button></form></td>
        </tr>
        </tbody>
    </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
