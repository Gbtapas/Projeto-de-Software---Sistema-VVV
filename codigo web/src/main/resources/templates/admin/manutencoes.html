<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Manutenções</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-3">Manutenção de modais <small class="text-muted">(RF04 / UC07)</small></h1>
    <div th:if="${msgSucesso}" class="alert alert-success" th:text="${msgSucesso}"></div>

    <form th:action="@{/admin/manutencoes}" method="post" class="row g-2 align-items-end mb-4">
        <div class="col-md-4"><label class="form-label">Modal</label>
            <select name="idModal" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="m : ${modais}" th:value="${m.id}"
                        th:text="${m.codigo + ' (' + m.tipo + ') — ' + m.status}"></option>
            </select></div>
        <div class="col-md-2"><label class="form-label">Início</label>
            <input name="dataInicio" type="date" class="form-control" required></div>
        <div class="col-md-2"><label class="form-label">Fim</label>
            <input name="dataFim" type="date" class="form-control" required></div>
        <div class="col-md-3"><label class="form-label">Descrição</label>
            <input name="descricao" class="form-control"></div>
        <div class="col-md-1 d-grid"><button class="btn btn-primary">Agendar</button></div>
    </form>

    <table class="table table-sm table-hover align-middle">
        <thead class="table-light"><tr><th>ID</th><th>Modal</th><th>Início</th><th>Fim</th><th>Descrição</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>
        <tr th:each="mn : ${manutencoes}">
            <td th:text="${mn.id}"></td>
            <td th:text="${mn.modal.codigo}"></td>
            <td th:text="${#temporals.format(mn.dataInicio, 'dd/MM/yyyy')}"></td>
            <td th:text="${#temporals.format(mn.dataFim, 'dd/MM/yyyy')}"></td>
            <td th:text="${mn.descricao}"></td>
            <td><span class="badge text-bg-secondary" th:text="${mn.status}"></span></td>
            <td>
                <div class="d-flex gap-1" th:if="${mn.status.name() == 'AGENDADA' or mn.status.name() == 'EM_ANDAMENTO'}">
                    <form th:action="@{'/admin/manutencoes/' + ${mn.id} + '/status'}" method="post">
                        <input type="hidden" name="status" value="CONCLUIDA">
                        <button class="btn btn-sm btn-outline-success">Concluir</button>
                    </form>
                    <form th:action="@{'/admin/manutencoes/' + ${mn.id} + '/status'}" method="post">
                        <input type="hidden" name="status" value="CANCELADA">
                        <button class="btn btn-sm btn-outline-danger">Cancelar</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
