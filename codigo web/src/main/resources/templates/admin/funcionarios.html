<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Funcionários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-3">Gestão de Funcionários <small class="text-muted">(RF16)</small></h1>
    <div th:if="${msgSucesso}" class="alert alert-success" role="alert" th:text="${msgSucesso}"></div>
    <div th:if="${msgErro}" class="alert alert-danger" role="alert" th:text="${msgErro}"></div>

    <!-- Formulário de cadastro -->
    <form th:action="@{/admin/funcionarios}" method="post" class="row g-2 align-items-end mb-4 border rounded p-3 bg-light">
        <h2 class="h6 mb-2">Novo funcionário</h2>
        <div class="col-md-2">
            <label for="f-cpf" class="form-label">CPF</label>
            <input id="f-cpf" name="cpf" class="form-control" maxlength="11" placeholder="Somente dígitos" required>
        </div>
        <div class="col-md-2">
            <label for="f-nome" class="form-label">Nome</label>
            <input id="f-nome" name="nome" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label for="f-tipo" class="form-label">Tipo</label>
            <select id="f-tipo" name="tipo" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
            </select>
        </div>
        <div class="col-md-1">
            <label for="f-cidade" class="form-label">Cidade</label>
            <input id="f-cidade" name="cidadeEndereco" class="form-control">
        </div>
        <div class="col-md-1">
            <label for="f-estado" class="form-label">Estado</label>
            <input id="f-estado" name="estadoEndereco" class="form-control" maxlength="2" placeholder="UF">
        </div>
        <div class="col-md-1">
            <label for="f-cep" class="form-label">CEP</label>
            <input id="f-cep" name="cep" class="form-control" maxlength="8" placeholder="Dígitos">
        </div>
        <div class="col-md-2">
            <label for="f-email" class="form-label">E-mail (login)</label>
            <input id="f-email" name="email" type="email" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label for="f-senha" class="form-label">Senha</label>
            <input id="f-senha" name="senha" type="password" class="form-control" required minlength="6">
        </div>
        <div class="col-md-1 d-grid mt-4">
            <button class="btn btn-primary">Cadastrar</button>
        </div>
    </form>

    <!-- Tabela de funcionários ativos -->
    <table class="table table-sm table-hover align-middle">
        <thead class="table-light">
            <tr>
                <th>Código</th><th>CPF</th><th>Nome</th><th>Tipo</th><th>Cidade</th><th>Ações</th>
            </tr>
        </thead>
        <tbody>
        <tr th:each="f : ${funcionarios}">
            <td th:text="${f.codigo}"></td>
            <td th:text="${f.cpf}"></td>
            <td th:text="${f.nome}"></td>
            <td><span class="badge text-bg-secondary" th:text="${f.tipo}"></span></td>
            <td th:text="${f.cidadeEndereco != null ? f.cidadeEndereco + '/' + f.estadoEndereco : '-'}"></td>
            <td>
                <form th:action="@{'/admin/funcionarios/' + ${f.id} + '/desativar'}" method="post"
                      onsubmit="return confirm('Desativar este funcionário?')">
                    <button class="btn btn-sm btn-outline-danger">Desativar</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(funcionarios)}">
            <td colspan="6" class="text-center text-muted">Nenhum funcionário ativo cadastrado.</td>
        </tr>
        </tbody>
    </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
