<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Programações de viagem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-3">Programações de viagem <small class="text-muted">(viagens vendáveis)</small></h1>
    <div th:if="${msgSucesso}" class="alert alert-success" th:text="${msgSucesso}"></div>

    <form th:action="@{/admin/programacoes}" method="post" class="row g-2 align-items-end mb-4">
        <div class="col-md-4"><label class="form-label">Rota</label>
            <select name="idRota" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="r : ${rotas}" th:value="${r.id}"
                        th:text="${r.codigo + ' — ' + r.descricao}"></option>
            </select></div>
        <div class="col-md-3"><label class="form-label">Modal</label>
            <select name="idModal" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="m : ${modais}" th:value="${m.id}"
                        th:text="${m.codigo + ' (' + m.tipo + ')'}"></option>
            </select></div>
        <div class="col-md-2"><label class="form-label">Data</label>
            <input name="data" type="date" class="form-control" required></div>
        <div class="col-md-1"><label class="form-label">Vagas</label>
            <input name="vagas" type="number" min="0" class="form-control" required></div>
        <div class="col-md-2"><label class="form-label">Valor base (R$)</label>
            <input name="valor" type="number" step="0.01" min="0.01" class="form-control" required></div>
        <div class="col-12"><button class="btn btn-primary mt-2">Criar viagem</button></div>
    </form>

    <table class="table table-sm table-hover">
        <thead class="table-light"><tr><th>ID</th><th>Rota</th><th>Modal</th><th>Data</th><th>Vagas</th><th>Valor</th><th>Status</th><th></th></tr></thead>
        <tbody>
        <tr th:each="p : ${programacoes}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.rota.descricao}"></td>
            <td th:text="${p.modal.codigo}"></td>
            <td th:text="${#temporals.format(p.dataViagem, 'dd/MM/yyyy')}"></td>
            <td th:text="${p.vagasDisponiveis}"></td>
            <td th:text="${'R$ ' + #numbers.formatDecimal(p.valorBase, 1, 'POINT', 2, 'COMMA')}"></td>
            <td th:text="${p.status}"></td>
            <td><form th:action="@{'/admin/programacoes/' + ${p.id} + '/excluir'}" method="post"
                      onsubmit="return confirm('Excluir?');">
                <button class="btn btn-sm btn-outline-danger">Excluir</button></form></td>
        </tr>
        </tbody>
    </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
