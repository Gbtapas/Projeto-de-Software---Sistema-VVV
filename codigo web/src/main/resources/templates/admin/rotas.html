<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Rotas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-3">Rotas <small class="text-muted">(+ trecho com horários — RN14)</small></h1>
    <div th:if="${msgSucesso}" class="alert alert-success" th:text="${msgSucesso}"></div>

    <form th:action="@{/admin/rotas}" method="post" class="row g-2 align-items-end mb-4">
        <div class="col-md-6"><label class="form-label">Descrição</label>
            <input name="descricao" class="form-control" placeholder="Ex.: Rio → São Paulo" required></div>
        <div class="col-md-3"><label class="form-label">Tipo</label>
            <select name="tipo" class="form-select">
                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
            </select></div>
        <div class="col-md-3"><label class="form-label">Código (opcional)</label>
            <input name="codigo" class="form-control"></div>
        <div class="col-md-3"><label class="form-label">Origem</label>
            <select name="idOrigem" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="c : ${cidades}" th:value="${c.id}"
                        th:text="${c.nome + ' (' + c.identificador + ')'}"></option>
            </select></div>
        <div class="col-md-3"><label class="form-label">Destino</label>
            <select name="idDestino" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="c : ${cidades}" th:value="${c.id}"
                        th:text="${c.nome + ' (' + c.identificador + ')'}"></option>
            </select></div>
        <div class="col-md-2"><label class="form-label">Partida</label>
            <input name="horaPartida" type="time" class="form-control" required></div>
        <div class="col-md-2"><label class="form-label">Chegada</label>
            <input name="horaChegada" type="time" class="form-control" required></div>
        <div class="col-md-2"><label class="form-label">Duração (min)</label>
            <input name="tempoMin" type="number" min="1" class="form-control" required></div>
        <div class="col-12 d-grid d-md-block"><button class="btn btn-primary mt-2">Salvar rota</button></div>
    </form>

    <table class="table table-sm table-hover">
        <thead class="table-light"><tr><th>ID</th><th>Código</th><th>Descrição</th><th>Origem</th><th>Destino</th><th>Tipo</th><th></th></tr></thead>
        <tbody>
        <tr th:each="r : ${rotas}">
            <td th:text="${r.id}"></td><td th:text="${r.codigo}"></td><td th:text="${r.descricao}"></td>
            <td th:text="${r.cidadeOrigem.identificador}"></td><td th:text="${r.cidadeDestino.identificador}"></td>
            <td th:text="${r.tipo}"></td>
            <td><form th:action="@{'/admin/rotas/' + ${r.id} + '/excluir'}" method="post"
                      onsubmit="return confirm('Excluir?');">
                <button class="btn btn-sm btn-outline-danger">Excluir</button></form></td>
        </tr>
        </tbody>
    </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
