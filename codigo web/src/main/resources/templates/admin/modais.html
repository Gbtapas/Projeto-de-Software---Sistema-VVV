<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Modais</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-3">Modais <small class="text-muted">(RF03)</small></h1>
    <div th:if="${msgSucesso}" class="alert alert-success" th:text="${msgSucesso}"></div>

    <form th:action="@{/admin/modais}" method="post" class="row g-2 align-items-end mb-4">
        <div class="col-md-3"><label class="form-label">Tipo</label>
            <select name="tipo" id="tipo" class="form-select" required>
                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
            </select></div>
        <div class="col-md-3"><label class="form-label">Modelo</label>
            <input name="modelo" class="form-control" required></div>
        <div class="col-md-2"><label class="form-label">Ano</label>
            <input name="ano" type="number" class="form-control" min="1950" max="2100" required></div>
        <div class="col-md-2"><label class="form-label">Capacidade</label>
            <input name="capacidade" type="number" class="form-control" min="1" required></div>
        <div class="col-md-2"><label class="form-label">Código (opcional)</label>
            <input name="codigo" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Transportadora</label>
            <select name="idTransportadora" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="t : ${transportadoras}" th:value="${t.id}" th:text="${t.nome}"></option>
            </select></div>
        <div class="col-md-4"><label class="form-label">Aeroporto base <small class="text-muted">(obrigatório p/ AVIAO — RN12)</small></label>
            <select name="idAeroportoBase" id="aeroporto" class="form-select">
                <option value="">— nenhum —</option>
                <option th:each="a : ${aeroportos}" th:value="${a.id}"
                        th:text="${a.codigoIata + ' - ' + a.nome}"></option>
            </select></div>
        <div class="col-md-2 d-grid"><button class="btn btn-primary">Salvar</button></div>
    </form>

    <table class="table table-sm table-hover">
        <thead class="table-light"><tr><th>ID</th><th>Código</th><th>Tipo</th><th>Modelo</th><th>Ano</th><th>Cap.</th><th>Status</th><th>Transp.</th><th></th></tr></thead>
        <tbody>
        <tr th:each="m : ${modais}">
            <td th:text="${m.id}"></td><td th:text="${m.codigo}"></td><td th:text="${m.tipo}"></td>
            <td th:text="${m.modelo}"></td><td th:text="${m.ano}"></td><td th:text="${m.capacidade}"></td>
            <td th:text="${m.status}"></td><td th:text="${m.transportadora.nome}"></td>
            <td><form th:action="@{'/admin/modais/' + ${m.id} + '/excluir'}" method="post"
                      onsubmit="return confirm('Excluir?');">
                <button class="btn btn-sm btn-outline-danger">Excluir</button></form></td>
        </tr>
        </tbody>
    </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// AVIAO exige aeroporto base (RN12) — reforço de UX; o banco também garante via CHECK.
document.addEventListener('DOMContentLoaded', function () {
    const tipo = document.getElementById('tipo'), aero = document.getElementById('aeroporto');
    const ajustar = () => { aero.required = (tipo.value === 'AVIAO'); };
    tipo.addEventListener('change', ajustar); ajustar();
});
</script>
</body>
</html>
