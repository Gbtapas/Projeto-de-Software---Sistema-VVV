<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Administração</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-4">Administração do sistema</h1>
    <div class="row g-3">
        <div class="col-md-4">
            <a th:href="@{/admin/cidades}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Cidades</h2><small class="text-muted">RF05</small>
                </div></div></a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/aeroportos}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Aeroportos</h2><small class="text-muted">RF06</small>
                </div></div></a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/transportadoras}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Transportadoras</h2><small class="text-muted">RF02</small>
                </div></div></a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/modais}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Modais</h2><small class="text-muted">RF03</small>
                </div></div></a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/rotas}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Rotas</h2><small class="text-muted">RN10 / RN14</small>
                </div></div></a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/programacoes}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Programações de viagem</h2><small class="text-muted">viagens vendáveis</small>
                </div></div></a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/manutencoes}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Manutenção de modais</h2><small class="text-muted">RF04 / UC07</small>
                </div></div></a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/funcionarios}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Funcionários</h2><small class="text-muted">RF16</small>
                </div></div></a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/pontos}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Pontos de Venda</h2><small class="text-muted">RF17 / RF18</small>
                </div></div></a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/transferencias}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Transferências</h2><small class="text-muted">RF15</small>
                </div></div></a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/relatorios}" class="text-decoration-none">
                <div class="card h-100 shadow-sm"><div class="card-body">
                    <h2 class="h6 mb-1">Relatórios</h2><small class="text-muted">UC10</small>
                </div></div></a>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
