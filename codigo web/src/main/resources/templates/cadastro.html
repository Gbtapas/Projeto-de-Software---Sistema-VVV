<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar passageiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container my-4" style="max-width:760px;">
    <h1 class="h4 mb-3">Cadastrar passageiro <small class="text-muted">(UC01)</small></h1>

    <form th:action="@{/passageiro/novo}" th:object="${passageiroForm}" method="post" novalidate>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nome *</label>
                <input type="text" th:field="*{nome}" class="form-control"
                       th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{nome}"></div>
            </div>
            <div class="col-md-3">
                <label class="form-label">CPF * <small class="text-muted">(11 dígitos)</small></label>
                <input type="text" th:field="*{cpf}" class="form-control" maxlength="11"
                       th:classappend="${#fields.hasErrors('cpf')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{cpf}"></div>
            </div>
            <div class="col-md-3">
                <label class="form-label">Nascimento *</label>
                <input type="date" th:field="*{dataNascimento}" class="form-control"
                       th:classappend="${#fields.hasErrors('dataNascimento')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{dataNascimento}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label">Telefone</label>
                <input type="text" th:field="*{telefone}" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">Profissão</label>
                <input type="text" th:field="*{profissao}" class="form-control">
            </div>

            <div class="col-12"><hr><h2 class="h6 text-muted">Endereço (opcional)</h2></div>
            <div class="col-md-8">
                <label class="form-label">Rua</label>
                <input type="text" th:field="*{rua}" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Número</label>
                <input type="text" th:field="*{numero}" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Bairro</label>
                <input type="text" th:field="*{bairro}" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Cidade</label>
                <input type="text" th:field="*{cidadeEndereco}" class="form-control">
            </div>
            <div class="col-md-2">
                <label class="form-label">UF</label>
                <input type="text" th:field="*{estadoEndereco}" class="form-control" maxlength="2">
            </div>
            <div class="col-md-2">
                <label class="form-label">CEP</label>
                <input type="text" th:field="*{cep}" class="form-control" maxlength="8">
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Cadastrar</button>
            <a th:href="@{/viagens}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
