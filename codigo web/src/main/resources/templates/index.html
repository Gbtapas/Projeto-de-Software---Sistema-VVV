<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vai&amp;Volta Viagens — Buscar viagens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<header class="vvv-hero text-center text-white">
    <div class="container py-5">
        <h1 class="display-5 fw-bold">Para onde você vai?</h1>
        <p class="lead">Compre passagens de avião, ônibus, trem e navio em um só lugar.</p>
    </div>
</header>

<main class="container" style="margin-top:-40px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5 mb-3">Buscar viagens disponíveis</h2>
            <form th:action="@{/viagens}" th:object="${busca}" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">Origem</label>
                    <select th:field="*{origem}" class="form-select">
                        <option value="">Qualquer origem</option>
                        <option th:each="c : ${cidades}"
                                th:value="${c.identificador}"
                                th:text="${c.nome + ' (' + c.identificador + ')'}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Destino</label>
                    <select th:field="*{destino}" class="form-select">
                        <option value="">Qualquer destino</option>
                        <option th:each="c : ${cidades}"
                                th:value="${c.identificador}"
                                th:text="${c.nome + ' (' + c.identificador + ')'}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Data (opcional)</label>
                    <input type="date" th:field="*{data}" class="form-control">
                </div>
                <div class="col-md-1 d-grid">
                    <button type="submit" class="btn btn-primary">Buscar</button>
                </div>
            </form>
        </div>
    </div>

    <p class="text-muted mt-3">
        Ainda não tem o passageiro cadastrado?
        <a th:href="@{/passageiro/novo}">Cadastre aqui</a> antes de reservar.
    </p>
</main>

<footer class="text-center text-muted py-4 mt-5">
    <small>Sistema Vai&amp;Volta Viagens (VVV) — Trabalho de Engenharia de Software</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
