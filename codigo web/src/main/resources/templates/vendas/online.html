<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Vendas online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4">
    <h1 class="h4 mb-3">Supervisão de vendas online <small class="text-muted">(RF14 / UC09)</small></h1>
    <div th:if="${msgSucesso}" class="alert alert-success" th:text="${msgSucesso}"></div>
    <p class="text-muted">Reservas feitas pelo canal online aguardando aprovação do Gerente de Negócios Virtuais.</p>

    <table class="table table-hover align-middle">
        <thead class="table-light"><tr><th>Reserva</th><th>Passageiro</th><th>Viagem</th><th>Valor</th><th>Status reserva</th><th>Venda</th><th>Ações</th></tr></thead>
        <tbody>
        <tr th:each="i : ${itens}">
            <td th:text="${i.reserva.codigo}"></td>
            <td th:text="${i.reserva.passageiro.nome}"></td>
            <td th:text="${i.reserva.programacao.rota.descricao}"></td>
            <td th:text="${'R$ ' + #numbers.formatDecimal(i.reserva.valorTotal, 1, 'POINT', 2, 'COMMA')}"></td>
            <td><span class="badge text-bg-secondary" th:text="${i.reserva.status}"></span></td>
            <td>
                <span th:if="${i.supervisionada}" class="badge text-bg-info" th:text="${i.venda.status}"></span>
                <span th:unless="${i.supervisionada}" class="text-muted">pendente</span>
            </td>
            <td>
                <div class="d-flex gap-1" th:unless="${i.supervisionada}">
                    <form th:action="@{'/vendas/online/' + ${i.reserva.id} + '/decidir'}" method="post">
                        <input type="hidden" name="aprovar" value="true">
                        <button class="btn btn-sm btn-outline-success">Aprovar</button>
                    </form>
                    <form th:action="@{'/vendas/online/' + ${i.reserva.id} + '/decidir'}" method="post"
                          onsubmit="return confirm('Recusar e cancelar a reserva?');">
                        <input type="hidden" name="aprovar" value="false">
                        <button class="btn btn-sm btn-outline-danger">Recusar</button>
                    </form>
                </div>
            </td>
        </tr>
        <tr th:if="${itens.isEmpty()}"><td colspan="7" class="text-center text-muted">Nenhuma venda online.</td></tr>
        </tbody>
    </table>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
