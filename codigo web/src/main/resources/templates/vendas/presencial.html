<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Venda presencial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-4" style="max-width:780px;">
    <h1 class="h4 mb-3">Venda presencial <small class="text-muted">(RF13 / RN29)</small></h1>
    <div th:if="${msgErro}" class="alert alert-danger" role="alert" th:text="${msgErro}"></div>

    <div th:if="${passageiros.isEmpty()}" class="alert alert-warning" role="alert">
        Nenhum passageiro cadastrado. <a th:href="@{/passageiro/novo}">Cadastre um</a> primeiro.
    </div>

    <form th:action="@{/vendas/presencial}" method="post" class="card card-body"
          onsubmit="return validarAcompanhante(this)">
        <div class="mb-3">
            <label for="idProgramacao" class="form-label">Viagem</label>
            <select id="idProgramacao" name="idProgramacao" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="v : ${viagens}" th:value="${v.idProgramacao}"
                        th:text="${v.descricaoRota + ' — ' + #temporals.format(v.dataViagem,'dd/MM/yyyy') + ' — R$ ' + #numbers.formatDecimal(v.valorBase,1,'POINT',2,'COMMA')}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="idPassageiro" class="form-label">Passageiro</label>
            <select id="idPassageiro" name="idPassageiro" class="form-select" required
                    th:disabled="${passageiros.isEmpty()}"
                    onchange="toggleAcompanhante(this)">
                <option value="" data-idade="-1">Selecione...</option>
                <option th:each="p : ${passageiros}"
                        th:value="${p.id}"
                        th:attr="data-idade=${p.idade}"
                        th:text="${p.nome + ' — ' + p.idade + ' anos'}"></option>
            </select>
        </div>
        <!-- Acompanhante: visível apenas quando passageiro tem entre 2 e 10 anos (RN04) -->
        <div id="acomp-row" class="mb-3 d-none">
            <label for="idAcompanhante" class="form-label text-warning fw-semibold">
                ⚠ Criança (2–10 anos) — selecione um acompanhante adulto (+21 anos):
            </label>
            <select id="idAcompanhante" name="idAcompanhante" class="form-select acomp-sel">
                <option value="">Selecione o acompanhante...</option>
                <option th:each="p : ${passageiros}"
                        th:value="${p.id}"
                        th:attr="data-idade=${p.idade}"
                        th:text="${p.nome + ' — ' + p.idade + ' anos'}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="idPonto" class="form-label">Ponto de venda</label>
            <select id="idPonto" name="idPonto" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="pt : ${pontos}" th:value="${pt.id}" th:text="${pt.nome}"></option>
            </select>
        </div>
        <button class="btn btn-primary" th:disabled="${passageiros.isEmpty()}">Registrar venda e ir ao pagamento</button>
    </form>
    <p class="text-muted mt-2 small">A reserva é criada no canal PRESENCIAL e a venda confirmada pelo funcionário (RN29).
       Em seguida você é levado ao pagamento para emitir o ticket.</p>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleAcompanhante(sel) {
    const form      = sel.closest('form');
    const acompRow  = form.querySelector('#acomp-row');
    const acompSel  = form.querySelector('.acomp-sel');
    const idade     = parseInt(sel.selectedOptions[0]?.dataset.idade ?? '-1', 10);
    const ehCrianca = idade >= 2 && idade <= 10;
    const passId    = sel.value;

    if (ehCrianca) {
        acompRow.classList.remove('d-none');
        acompSel.required = true;
        Array.from(acompSel.options).forEach(opt => {
            if (opt.value === '') return;
            const idadeOpt = parseInt(opt.dataset.idade ?? '0', 10);
            opt.hidden = (opt.value === passId) || (idadeOpt <= 21);
        });
    } else {
        acompRow.classList.add('d-none');
        acompSel.required = false;
        acompSel.value    = '';
        Array.from(acompSel.options).forEach(opt => opt.hidden = false);
    }
}

function validarAcompanhante(form) {
    const acompRow = form.querySelector('#acomp-row');
    const acompSel = form.querySelector('.acomp-sel');
    if (acompRow && !acompRow.classList.contains('d-none') && !acompSel.value) {
        alert('Selecione um acompanhante adulto (mais de 21 anos) para o passageiro menor de idade.');
        return false;
    }
    return true;
}
</script>
</body>
</html>
