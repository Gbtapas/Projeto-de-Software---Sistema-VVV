<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento da reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container my-4" style="max-width:820px;">
    <h1 class="h4 mb-3">Pagamento <small class="text-muted">(UC04)</small></h1>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Resumo da reserva</div>
                <div class="card-body">
                    <p class="mb-1"><strong>Código:</strong> <span th:text="${reserva.codigo}">—</span></p>
                    <p class="mb-1"><strong>Passageiro:</strong> <span th:text="${reserva.passageiro.nome}"></span></p>
                    <p class="mb-1"><strong>Viagem:</strong> <span th:text="${reserva.programacao.rota.descricao}"></span></p>
                    <p class="mb-1"><strong>Data:</strong>
                        <span th:text="${#temporals.format(reserva.programacao.dataViagem, 'dd/MM/yyyy')}"></span></p>
                    <p class="mb-1"><strong>Status:</strong>
                        <span class="badge text-bg-warning" th:text="${reserva.status}"></span></p>
                    <hr>
                    <p class="mb-1">Valor bruto:
                        <span th:text="${'R$ ' + #numbers.formatDecimal(reserva.valorBruto, 1, 'POINT', 2, 'COMMA')}"></span></p>
                    <p class="mb-1">Desconto:
                        <span th:text="${'R$ ' + #numbers.formatDecimal(reserva.valorDesconto, 1, 'POINT', 2, 'COMMA')}"></span></p>
                    <p class="h5">Total: <span class="text-success"
                        th:text="${'R$ ' + #numbers.formatDecimal(reserva.valorTotal, 1, 'POINT', 2, 'COMMA')}"></span></p>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Forma de pagamento</div>
                <div class="card-body">
                    <form th:action="@{/pagamento}" th:object="${pagamentoForm}" method="post">
                        <input type="hidden" th:field="*{idReserva}">
                        <div class="mb-3">
                            <label for="tipo" class="form-label">Tipo</label>
                            <select th:field="*{tipo}" id="tipo" class="form-select">
                                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="parcelas" class="form-label">Parcelas</label>
                            <select th:field="*{parcelas}" id="parcelas" class="form-select">
                                <option th:each="n : ${#numbers.sequence(1, 12)}" th:value="${n}"
                                        th:text="${n + 'x'}"></option>
                            </select>
                            <div class="form-text">
                                Até 4x sem juros (RN20). Acima de 4x, 5% de juros (RN21).
                                Débito é sempre à vista (RN19).
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Pagar e emitir ticket</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
