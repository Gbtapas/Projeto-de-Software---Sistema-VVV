<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Operação não permitida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container my-5" style="max-width:640px;">
    <div class="alert alert-danger">
        <h1 class="h5">Operação rejeitada pelas regras de negócio</h1>
        <p class="mb-0" th:text="${mensagem}">Mensagem de erro.</p>
    </div>
    <p class="text-muted">
        Esta validação veio das regras de negócio implementadas no banco de dados
        (constraints e triggers). Ajuste os dados e tente novamente.
    </p>
    <a th:href="@{/}" class="btn btn-primary">Voltar ao início</a>
</main>
</body>
</html>
