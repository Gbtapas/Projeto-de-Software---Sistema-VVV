<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket emitido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container my-4" style="max-width:720px;">
    <div class="alert alert-success">
        <strong>Pagamento aprovado!</strong> Ticket emitido automaticamente (UC05).
    </div>

    <div class="card vvv-ticket">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h2 class="h5 mb-0">✈ Vai&amp;Volta Viagens</h2>
                    <small class="text-muted">Bilhete eletrônico</small>
                </div>
                <div class="text-end">
                    <div class="small text-muted">Localizador</div>
                    <div class="h4 fw-bold mb-0" th:text="${ticket.localizador}">XXXXXXXX</div>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-6 mb-2">
                    <div class="small text-muted">Passageiro</div>
                    <div th:text="${reserva.passageiro.nome}"></div>
                </div>
                <div class="col-6 mb-2">
                    <div class="small text-muted">Reserva</div>
                    <div th:text="${reserva.codigo}"></div>
                </div>
                <div class="col-6 mb-2">
                    <div class="small text-muted">Trecho</div>
                    <div th:text="${reserva.programacao.rota.descricao}"></div>
                </div>
                <div class="col-6 mb-2">
                    <div class="small text-muted">Data</div>
                    <div th:text="${#temporals.format(reserva.programacao.dataViagem, 'dd/MM/yyyy')}"></div>
                </div>
                <div class="col-4 mb-2">
                    <div class="small text-muted">Partida</div>
                    <div th:text="${ticket.horaPartida}"></div>
                </div>
                <div class="col-4 mb-2">
                    <div class="small text-muted">Chegada</div>
                    <div th:text="${ticket.horaChegada}"></div>
                </div>
                <div class="col-4 mb-2">
                    <div class="small text-muted">Duração</div>
                    <div th:text="${ticket.tempoFormatado}"></div>
                </div>
                <div class="col-6 mb-2">
                    <div class="small text-muted">Modal</div>
                    <div th:text="${reserva.programacao.modal.tipo + ' — ' + reserva.programacao.modal.modelo}"></div>
                </div>
                <div class="col-6 mb-2">
                    <div class="small text-muted">Classe</div>
                    <div th:text="${ticket.tipoPassagem}"></div>
                </div>
            </div>
            <hr>
            <div class="row" th:if="${pagamento != null}">
                <div class="col-6">
                    <div class="small text-muted">Pagamento</div>
                    <div th:text="${pagamento.tipo + ' em ' + pagamento.parcelas + 'x'}"></div>
                </div>
                <div class="col-6 text-end">
                    <div class="small text-muted">Total pago</div>
                    <div class="h5 text-success"
                         th:text="${'R$ ' + #numbers.formatDecimal(pagamento.valorTotal, 1, 'POINT', 2, 'COMMA')}"></div>
                </div>
            </div>
            <div class="text-center mt-2">
                <span class="badge text-bg-primary" th:text="${'Código do ticket: ' + ticket.codigoTicket}"></span>
            </div>
        </div>
    </div>

    <div class="text-center mt-3 d-print-none">
        <a th:href="@{/}" class="btn btn-outline-secondary">Nova busca</a>
        <button onclick="window.print()" class="btn btn-primary">Imprimir</button>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
