<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container my-4">
    <h1 class="h4 mb-3">Minhas reservas</h1>

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible" role="alert">
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible" role="alert">
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>

    <div th:if="${reservas.isEmpty()}" class="alert alert-info">
        Nenhuma reserva encontrada para o seu cadastro.
        <a th:href="@{/viagens}">Busque viagens disponíveis</a> para fazer sua primeira reserva.
    </div>

    <div class="table-responsive" th:unless="${reservas.isEmpty()}">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th scope="col">Código</th>
                <th scope="col">Data da reserva</th>
                <th scope="col">Rota</th>
                <th scope="col">Data da viagem</th>
                <th scope="col">Modal</th>
                <th scope="col">Status</th>
                <th scope="col" class="text-end">Valor total</th>
                <th scope="col" aria-label="Ações"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reservas}">
                <td class="fw-semibold" th:text="${r.codigo}"></td>
                <td th:text="${#temporals.format(r.dataCriacao, 'dd/MM/yyyy HH:mm')}"></td>
                <td>
                    <span th:text="${r.programacao.rota.cidadeOrigem.nome}"></span>
                    →
                    <span th:text="${r.programacao.rota.cidadeDestino.nome}"></span>
                </td>
                <td th:text="${#temporals.format(r.programacao.dataViagem, 'dd/MM/yyyy')}"></td>
                <td th:text="${r.programacao.modal.tipo}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${r.status.name() == 'CONFIRMADA'} ? 'text-bg-success'
                                        : (${r.status.name() == 'CANCELADA'} ? 'text-bg-danger'
                                        : 'text-bg-warning')"
                          th:text="${r.status}"></span>
                </td>
                <td class="text-end fw-semibold"
                    th:text="${'R$ ' + #numbers.formatDecimal(r.valorTotal, 1, 'POINT', 2, 'COMMA')}"></td>
                <td class="d-flex gap-1">
                    <a class="btn btn-sm btn-outline-primary"
                       th:if="${r.status.name() == 'CONFIRMADA'}"
                       th:href="@{/ticket/reserva/{id}(id=${r.id})}">Ver ticket</a>
                    <form th:if="${r.status.name() != 'CANCELADA'}"
                          th:action="@{/minhas-reservas/{id}/cancelar(id=${r.id})}" method="post"
                          onsubmit="return confirm('Tem certeza que deseja cancelar esta reserva?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Cancelar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
