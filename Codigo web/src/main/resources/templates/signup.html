<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta — Vai&amp;Volta Viagens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="container my-5" style="max-width:540px;">
    <h1 class="h4 mb-3 text-center">Criar conta de cliente</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/signup}" th:object="${clienteSignupForm}" method="post" novalidate>
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome Completo *</label>
                    <input type="text" th:field="*{nome}" class="form-control"
                           th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'" required autofocus>
                    <div class="invalid-feedback" th:errors="*{nome}"></div>
                </div>

                <div class="mb-3">
                    <label for="cpf" class="form-label">CPF * <small class="text-muted">(11 dígitos, apenas números)</small></label>
                    <input type="text" th:field="*{cpf}" class="form-control" maxlength="11"
                           th:classappend="${#fields.hasErrors('cpf')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:errors="*{cpf}"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">E-mail * <small class="text-muted">(usado para login)</small></label>
                    <input type="email" th:field="*{email}" class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha * <small class="text-muted">(mínimo 6 caracteres)</small></label>
                    <input type="password" th:field="*{senha}" class="form-control"
                           th:classappend="${#fields.hasErrors('senha')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:errors="*{senha}"></div>
                </div>

                <div class="mb-3">
                    <label for="telefone" class="form-label">Telefone</label>
                    <input type="text" th:field="*{telefone}" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary w-100">Registrar e Criar Conta</button>
            </form>
        </div>
    </div>

    <p class="text-center mt-3">Já tem uma conta? <a th:href="@{/login}">Entrar</a></p>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
